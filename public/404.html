<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MM's Site</title>
    <script>
      // GitHub Pages SPA redirect
      // When GitHub serves a 404 for a path like /blog/post,
      // this script captures the path and redirects to the root
      // with the path encoded in the query string so React can read it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
